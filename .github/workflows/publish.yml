name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major) or explicit version like 1.2.3'
        required: true
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: 11.0.3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check, lint, and test
        run: pnpm check && pnpm lint && pnpm test

      - name: Bump version
        run: pnpm version ${{ inputs.version }} --no-git-tag-version

      - name: Get new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changelog and version bump
        run: |
          git add CHANGELOG.md package.json
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"

      - name: Tag release
        run: git tag ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
